<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Bio oficial da R2 Print Lab com produtos em impressao 3D, Mercado Livre, WhatsApp e Instagram."
    />
    <meta name="theme-color" content="#1f4564" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://r2printlab.github.io" />
    <meta property="og:title" content="R2 Print Lab | Impressao 3D personalizada" />
    <meta
      property="og:description"
      content="Produtos criativos, decorativos, geeks e personalizados feitos em impressao 3D."
    />
    <meta property="og:image" content="https://r2printlab.github.io/og-image.svg" />
    <title>R2 Print Lab | Impressao 3D personalizada</title>
    <script>
      (() => {
        const storedTheme = localStorage.getItem("r2-theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = storedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.classList.toggle("dark", theme === "dark");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
