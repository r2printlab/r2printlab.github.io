<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Bio oficial da R2 Print Lab com colecoes, produtos, Mercado Livre, Shopee e Instagram."
    />
    <meta name="theme-color" content="#1f4564" />
    <link rel="icon" type="image/png" href="/assets/logo-r2.png" />
    <link rel="apple-touch-icon" href="/assets/logo-r2.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://r2printlab.github.io" />
    <meta property="og:title" content="R2 Print Lab Bio" />
    <meta
      property="og:description"
      content="Colecoes criativas, presentes e acessorios com venda pelos canais oficiais da R2 Print Lab."
    />
    <meta property="og:image" content="https://r2printlab.github.io/assets/logo-r2.png" />
    <title>R2 Print Lab Bio</title>
    <script>
      (() => {
        const storedTheme = localStorage.getItem("r2-theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = storedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.classList.toggle("dark", theme === "dark");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
