<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">R2 Print Lab</title>
  <desc id="desc">Imagem de compartilhamento da bio oficial da R2 Print Lab.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7f9fb"/>
      <stop offset="0.55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e8f0f6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#143047" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1000" cy="92" r="190" fill="#e8f0f6" opacity="0.9"/>
  <circle cx="160" cy="520" r="210" fill="#1f4564" opacity="0.1"/>
  <g filter="url(#shadow)">
    <rect x="120" y="115" width="960" height="400" rx="54" fill="#ffffff" opacity="0.9"/>
    <rect x="168" y="168" width="140" height="140" rx="38" fill="#143047"/>
